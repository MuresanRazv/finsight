server:
  port: 8080

spring:
  application:
    name: core-api

  # Jackson JSON configuration
  jackson:
    property-naming-strategy: SNAKE_CASE
  
  # Let Flyway manage the database schema
  flyway:
    enabled: true
    # Location of the migration scripts
    locations: classpath:db/migration
    # Automatically baseline the schema if it's not empty
    baseline-on-migrate: true

  # Configure JPA to depend on Flyway
  jpa:
    hibernate:
      # Validate the schema against entities, but don't auto-create tables
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:postgres}?stringtype=unspecified
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3s
          max-interval: 10s
          max-attempts: 5
          multiplier: 2

springdoc:
  swagger-ui:
    path: /api/docs
  api-docs:
    path: /api/docs-spec

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000 # 1 day
      refresh-token:
        expiration: 604800000 # 7 days

nlp:
  api:
    url: ${NLP_API_URL:http://localhost:8000}

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
