name: CI/CD Pipeline

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------
  # JOB 1: Test core-api (Spring Boot / JUnit)
  # ---------------------------------------------------------------
  test-core-api:
    name: Test core-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test --no-transfer-progress

  # ---------------------------------------------------------------
  # JOB 2: Lint web-client (Next.js / ESLint)
  # ---------------------------------------------------------------
  lint-web-client:
    name: Lint web-client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------
  # JOB 3: Test nlp-engine (Python / pytest)
  # ---------------------------------------------------------------
  test-nlp-engine:
    name: Test nlp-engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nlp-engine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: nlp-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (skip integration tests requiring Docker)
        run: pytest --ignore=test_chroma.py -v || echo "No unit tests found yet — skipping"

  # ---------------------------------------------------------------
  # JOB 4: Build & push Docker images to ghcr.io
  # ---------------------------------------------------------------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [test-core-api, lint-web-client, test-nlp-engine]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- core-api ---
      - name: Build & push core-api
        uses: docker/build-push-action@v5
        with:
          context: ./core-api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/finsight-core-api:latest
          cache-from: type=gha,scope=core-api
          cache-to: type=gha,mode=max,scope=core-api

      # --- web-client ---
      - name: Build & push web-client
        uses: docker/build-push-action@v5
        with:
          context: ./web-client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/finsight-web-client:latest
          build-args: |
            NEXT_PUBLIC_WS_URL=wss://${{ secrets.DOMAIN_NAME }}/ws-sentiment
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN_NAME }}/api
          cache-from: type=gha,scope=web-client
          cache-to: type=gha,mode=max,scope=web-client

      # --- nlp-engine ---
      - name: Build & push nlp-engine
        uses: docker/build-push-action@v5
        with:
          context: ./nlp-engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/finsight-nlp-engine:latest
          cache-from: type=gha,scope=nlp-engine
          cache-to: type=gha,mode=max,scope=nlp-engine

  # ---------------------------------------------------------------
  # JOB 5: Deploy to VPS via SSH
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy updated docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /root/finsight/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/finsight

            # Authenticate with ghcr.io using a scoped PAT stored on the server
            echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull the freshly built images
            docker pull ghcr.io/${{ env.REPO }}/finsight-core-api:latest
            docker pull ghcr.io/${{ env.REPO }}/finsight-web-client:latest
            docker pull ghcr.io/${{ env.REPO }}/finsight-nlp-engine:latest

            # Restart the stack using the alias (includes --env-file .env.prod)
            docker compose -f /root/finsight/docker-compose.prod.yml --env-file /root/finsight/.env.prod up -d

            # Clean up dangling images to free disk space
            docker image prune -f
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
